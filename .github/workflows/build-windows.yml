name: Build Windows

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build
        run: wails build -platform windows/amd64

      - name: Copy manual as manual.txt
        run: Copy-Item docs/manual.md build/bin/manual.txt

      - name: Copy elsa.db
        run: Copy-Item build/elsa.db build/bin/elsa.db

      - name: Create ZIP
        run: |
          Compress-Archive -Path build/bin/bms-elsa.exe, build/bin/manual.txt, build/bin/elsa.db -DestinationPath build/bin/bms-elsa.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/bms-elsa.zip
